# Demand Letter Template

- name: "Standard Demand Letter"
  type: "demand"
  description: "Formal demand letter to publisher or counterparty"
  required_sections:
    - section: "header"
      description: "Date, addressee, RE line with deal/agreement reference"
    - section: "relationship"
      description: "Establish the contractual relationship and its terms"
    - section: "obligations"
      description: "State the counterparty's specific obligations under the agreement"
    - section: "breaches"
      description: "Detail each specific breach with evidence references"
    - section: "damages"
      description: "Quantify damages including prejudgment interest"
    - section: "demand"
      description: "Specific actions demanded (payment, accounting, correction)"
    - section: "deadline"
      description: "Response deadline (typically 30 days)"
    - section: "consequences"
      description: "State consequences of non-compliance (regulatory filing, litigation)"
    - section: "reservation"
      description: "Reserve all rights and remedies"
  tone_guidelines:
    - "Professional and factual — no emotional language"
    - "Cite specific contract provisions by section number"
    - "Reference specific evidence by exhibit number"
    - "State damages precisely with calculation methodology"
    - "Do not threaten — state consequences factually"

- name: "Follow-Up Letter (14 days)"
  type: "follow_up"
  description: "First follow-up after no response"
  required_sections:
    - section: "reference"
      description: "Reference original demand by date and tracking number"
    - section: "non_response"
      description: "Note lack of response within contractual/reasonable timeframe"
    - section: "restatement"
      description: "Brief restatement of key demands"
    - section: "extended_deadline"
      description: "New deadline (typically 14 additional days)"
    - section: "escalation_warning"
      description: "Note that regulatory and legal remedies will be pursued"

- name: "Follow-Up Letter (30 days)"
  type: "follow_up_final"
  description: "Final follow-up before escalation"
  required_sections:
    - section: "reference"
      description: "Reference original demand and first follow-up"
    - section: "final_notice"
      description: "State this is final notice before regulatory/legal action"
    - section: "specific_filings"
      description: "Name specific regulatory bodies and courts where complaints/actions will be filed"
    - section: "hard_deadline"
      description: "Final deadline (7-14 days)"

- name: "Regulatory Complaint"
  type: "regulatory"
  description: "Complaint to regulatory body (AG, Copyright Office, etc.)"
  required_sections:
    - section: "complainant"
      description: "Full identification of complainant"
    - section: "respondent"
      description: "Full identification of entity complained against"
    - section: "jurisdiction"
      description: "Basis for regulatory body's jurisdiction"
    - section: "facts"
      description: "Chronological statement of facts"
    - section: "violations"
      description: "Specific laws/regulations violated"
    - section: "evidence"
      description: "List of attached evidence"
    - section: "relief"
      description: "Specific relief requested"
